<!DOCTYPE html>
<html>
<head>
<title>Extensity</title>
<link rel="stylesheet" type="text/css" href="styles/normalize.css" />
<link rel="stylesheet" type="text/css" href="styles/font-awesome.min.css" />
<link rel="stylesheet" type="text/css" href="styles/index.css" />
<script type="text/javascript" src="js/libs/underscore-min.js"></script>
<script type="text/javascript" src="js/libs/underscore.string.min.js"></script>
<script type="text/javascript" src="js/libs/knockout-3.5.1.js"></script>
<script type="text/javascript" src="js/libs/knockout-secure-binding.min.js"></script>
<script type="text/javascript" src="js/storage.js"></script>
<script type="text/javascript" src="js/engine.js"></script>
<script type="text/javascript" src="js/index.js"></script>
</head>
<body class="list-view">
<section id="header" class="main" data-sbind="visible: opts.showHeader">
  <h1>
    <a id="title" href="https://chrome.google.com/webstore/detail/jjmflmamggggndanpgfnpelongoepncg" target="_blank">
      <img src="images/icon48.png" width="16" height="16" /> Extensity
    </a>
    <a href="#" class="page" data-sbind="click: switch.undo, css:{disabled: !canUndo()}"><i class="fa fa-undo" title="Undo"></i></a>
    <a href="#" class="page" data-sbind="click: toggleViewMode"><i class="fa" data-sbind="css: opts.viewMode() == 'grid' ? 'fa-list' : 'fa-th-large'" title="Toggle view"></i></a>
    <a href="#" class="page" data-sbind="click: openDashboard"><i class="fa fa-table" title="Open dashboard"></i></a>
    <a href="options.html" class="page" target="_blank"><i class="fa fa-cog" title="Options"></i></a>
    <a href="profiles.html" class="page" target="_blank"><i class="fa fa-user-circle-o" title="Profiles"></i></a>
    <a href="chrome://extensions" class="page" target="_blank" data-sbind="click: openChromeExtensions"><i class="fa fa-puzzle-piece" title="Chrome extensions"></i></a>
    <a href="#" class="switch" data-sbind="click: switch.flip"><i class="fa" data-sbind="css: switch.toggleStyle" title="Toggle all"></i></a>
  </h1>
</section>

<section id="toolbar" class="main">
  <div class="sort-modes">
    <button type="button" data-sbind="click: function(){ setSortMode('alpha'); }, css:{selected: opts.sortMode() == 'alpha'}">A-Z</button>
    <button type="button" data-sbind="click: function(){ setSortMode('frequency'); }, css:{selected: opts.sortMode() == 'frequency'}">Popular</button>
    <button type="button" data-sbind="click: function(){ setSortMode('recent'); }, css:{selected: opts.sortMode() == 'recent'}">Recent</button>
  </div>
  <p class="error" data-sbind="visible: error, text: error"></p>
</section>

<section id="search" class="main" data-sbind="if: opts.searchBox">
  <p><i class="fa fa-search"></i> <input type="text" data-sbind="value: search.q, valueUpdate: 'keyup'" tabindex="1" autofocus /></p>
</section>

<section id="content" class="main" data-sbind="visible: !loading()">
  <section id="profiles" data-sbind="if: listedProfiles.any, visible: !search.q">
    <h1>Profiles</h1>
    <ul class="items" data-sbind="foreach: listedProfiles">
      <li class="app keyboard-row" tabindex="0">
        <div class="profile-row" data-sbind="click: $root.setProfile">
          <i class="fa fa-check" data-sbind="visible: name() == $parent.activeProfile()"></i>
          <i class="fa fa-lightbulb-o" data-sbind="visible: name() != $parent.activeProfile() && name() == '__always_on'"></i>
          <i class="fa fa-star" data-sbind="visible: name() != $parent.activeProfile() && name() == '__favorites'"></i>
          <i class="fa fa-user-circle-o" data-sbind="visible: name() != $parent.activeProfile() && !reserved()"></i>
          <span data-sbind="text: short_name"></span>
        </div>
      </li>
    </ul>
  </section>

  <section data-sbind="if: listedFavorites.any">
    <h1>Favorites</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedFavorites}"></ul>
  </section>

  <section data-sbind="if: opts.appsFirst() && opts.groupApps()">
    <h1 data-sbind="visible: listedApps.any">Apps</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedApps}"></ul>
    <h1 data-sbind="visible: listedExtensions.any">Extensions</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedExtensions}"></ul>
  </section>

  <section data-sbind="if: !opts.appsFirst() && opts.groupApps()">
    <h1 data-sbind="visible: listedExtensions.any">Extensions</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedExtensions}"></ul>
    <h1 data-sbind="visible: listedApps.any">Apps</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedApps}"></ul>
  </section>

  <section data-sbind="if: !opts.groupApps()">
    <h1 data-sbind="visible: listedItems.any">Extensions &amp; Apps</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedItems}"></ul>
  </section>

  <section data-sbind="visible: emptyItems">
    <p class="empty"><i class="fa fa-exclamation-triangle"></i><br />No Extensions or Apps found.</p>
  </section>
</section>

<section class="main" data-sbind="visible: loading">
  <p class="empty">Loading…</p>
</section>

<script type="text/html" id="item-template">
  <!-- ko if: !isApp() -->
  <li class="extension keyboard-row" tabindex="0" data-sbind="click: $parent.toggleExtension, event:{keydown: function(d,e){ $parent.handleRowKeydown(d,e); }}, css:{disabled: disabled()}">
    <div class="item-main">
      <img width="16" height="16" data-sbind="attr:{src:icon}" />
      <div class="labels">
        <span class="name" data-sbind="text: short_name"></span>
        <div class="badges">
          <span class="badge always-on" data-sbind="visible: $parent.opts.showAlwaysOnBadge() && alwaysOn()">Always On</span>
          <!-- ko foreach: groupBadges -->
          <span class="badge group" data-sbind="text: name"></span>
          <!-- /ko -->
        </div>
      </div>
    </div>
    <div class="item-actions">
      <i class="fa fa-flask" title="Development" data-sbind="visible: is_development()"></i>
      <i class="fa fa-gear" title="Options" data-sbind="visible: $parent.opts.showOptions() && optionsUrl() && !disabled(), click: $parent.launchOptions, clickBubble: false"></i>
    </div>
  </li>
  <!-- /ko -->
  <!-- ko if: isApp() -->
  <li class="app keyboard-row" tabindex="0" data-sbind="click: $parent.launchApp, event:{keydown: function(d,e){ $parent.handleRowKeydown(d,e); }}">
    <div class="item-main">
      <img width="16" height="16" data-sbind="attr:{src:icon}" />
      <div class="labels">
        <span class="name" data-sbind="text: short_name"></span>
      </div>
    </div>
    <div class="item-actions">
      <i class="fa fa-flask" title="Development" data-sbind="visible: is_development()"></i>
      <i class="fa fa-gear" title="Options" data-sbind="visible: $parent.opts.showOptions() && optionsUrl() && !disabled(), click: $parent.launchOptions, clickBubble: false"></i>
    </div>
  </li>
  <!-- /ko -->
</script>
</body>
</html>
